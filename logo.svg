<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 72" role="img" aria-label="Nordstrom Company — Accounting Services & Consulting">
  <defs>
    <linearGradient id="markGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3F8A77"/>
      <stop offset="100%" stop-color="#1F4A3F"/>
    </linearGradient>
  </defs>

  <!-- Mark -->
  <g>
    <rect x="0" y="4" width="64" height="64" rx="14" fill="url(#markGradient)"/>
    <!-- Stylized N -->
    <path d="M16 50 L16 22 L22 22 L42 44 L42 22 L48 22 L48 50 L42 50 L22 28 L22 50 Z"
          fill="#FFFFFF"/>
    <!-- Subtle ledger line accent -->
    <rect x="16" y="54" width="32" height="2" rx="1" fill="#FFFFFF" opacity="0.55"/>
  </g>

  <!-- Wordmark -->
  <g font-family="'Source Serif 4', 'Source Serif Pro', Georgia, serif">
    <text x="80" y="38"
          font-size="22"
          font-weight="600"
          fill="currentColor"
          letter-spacing="-0.3">Nordstrom Company</text>
    <text x="80" y="58"
          font-size="9"
          font-weight="600"
          font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          fill="#3F8A77"
          letter-spacing="2.2">ACCOUNTING SERVICES &amp; CONSULTING</text>
  </g>
</svg>
